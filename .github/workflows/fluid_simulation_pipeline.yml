name: STEP Spatial Metadata Processor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  code_quality_check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3

      # 🔧 GLOBAL ROBOT IDENTITY + NOTES INITIALIZATION
      - name: 🤖 Initialize Robot Identity & Notes
        run: |
          git config --global user.name "Automation Engine"
          git config --global user.email "automation@yourdomain"
          git config --global notes.rewriteRef "refs/notes/*"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 🐍 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Run autoflake to remove unused imports
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src

      - name: 💀 Run vulture to find dead code
        run: |
          vulture src || echo "⚠️ Vulture found unused code — review manually if needed"

      - name: 🚀 Commit autoflake changes
        run: |
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "🤖 robot: auto-clean unused imports & variables"

            # Inline Git Notes
            git notes add -m "robot: true" || true
            git push origin refs/notes/* || true

            git push origin HEAD
          else
            echo "No autoflake changes to commit."
          fi

  process_step_for_coordinates:
    needs: code_quality_check
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      ENABLE_RULE_DEBUG: true
      resolution: 0.5

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔧 GLOBAL ROBOT IDENTITY + NOTES INITIALIZATION
      - name: 🤖 Initialize Robot Identity & Notes
        run: |
          git config --global user.name "Automation Engine"
          git config --global user.email "automation@yourdomain"
          git config --global notes.rewriteRef "refs/notes/*"

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 🧱 Install system dependencies & Gmsh
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglu1-mesa-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libxrender1 \
            gmsh

      - name: 🐍 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Confirm Gmsh & Python bindings
        run: |
          gmsh -version || { echo "❌ Gmsh CLI not found"; exit 1; }
          python -c "import gmsh; gmsh.initialize(); gmsh.finalize(); print('✅ Gmsh Python bindings operational')" || { echo "❌ Gmsh Python bindings failed"; exit 1; }

      # ----------------------------------------------------------------------
      # Integration Test 1: test_cube_no_slip (HARD FAIL on mismatch)
      # ----------------------------------------------------------------------
      - name: 🏃 Run Integration Test (test_cube_no_slip)
        id: integration_test_cube_no_slip
        run: |
          STEP_FILE="tests/test_models/test_cube.step"
          EXPECTED_OUTPUT_PATH="tests/test_models/test_cube_output_no_slip.json"
          TEMP_OUTPUT_FILE="tests/test_models/test_cube_cli_output_no_slip.json"

          if [ ! -f "$STEP_FILE" ] || [ ! -f "$EXPECTED_OUTPUT_PATH" ]; then
            echo "❌ Fatal Error: Required file missing. Cannot run integration test."
            exit 1
          fi

          echo "--- Running test: test_cube_no_slip ---"

          python3 src/gmsh_runner.py \
            --step "$STEP_FILE" \
            --lc 0.5 \
            --output "$TEMP_OUTPUT_FILE"

          python3 tests/helpers/compare_json.py "$EXPECTED_OUTPUT_PATH" "$TEMP_OUTPUT_FILE"

          echo "✅ Integration test completed for test_cube_no_slip."

      # ----------------------------------------------------------------------
      # Integration Test 2: cube_with_hole_no_slip (HARD FAIL on mismatch)
      # ----------------------------------------------------------------------
      - name: 🏃 Run Integration Test (cube_with_hole_no_slip)
        id: integration_test_cube_with_hole_no_slip
        run: |
          STEP_FILE="tests/test_models/cube_with_hole.step"
          EXPECTED_OUTPUT_PATH="tests/test_models/cube_with_hole_internal_output_no_slip.json"
          TEMP_OUTPUT_FILE="tests/test_models/cube_with_hole_cli_output_no_slip.json"

          if [ ! -f "$STEP_FILE" ] || [ ! -f "$EXPECTED_OUTPUT_PATH" ]; then
            echo "❌ Fatal Error: Required file missing. Cannot run integration test."
            exit 1
          fi

          echo "--- Running test: cube_with_hole_no_slip ---"

          python3 src/gmsh_runner.py \
            --step "$STEP_FILE" \
            --lc 0.5 \
            --output "$TEMP_OUTPUT_FILE"

          python3 tests/helpers/compare_json.py "$EXPECTED_OUTPUT_PATH" "$TEMP_OUTPUT_FILE"

          echo "✅ Integration test completed for cube_with_hole_no_slip."

      # ----------------------------------------------------------------------
      # Integration Test 3: hollow_cylinder_external_output_slip (HARD FAIL on mismatch)
      # ----------------------------------------------------------------------
      - name: 🏃 Run Integration Test (hollow_cylinder_external_output_slip)
        id: integration_test_hollow_cylinder_external_output_slip
        run: |
          STEP_FILE="tests/test_models/hollow_cylinder.step"
          EXPECTED_OUTPUT_PATH="tests/test_models/hollow_cylinder_external_output_no_slip.json"
          TEMP_OUTPUT_FILE="tests/test_models/hollow_cylinder_cli_output_slip.json"

          if [ ! -f "$STEP_FILE" ] || [ ! -f "$EXPECTED_OUTPUT_PATH" ]; then
            echo "❌ Fatal Error: Required file missing. Cannot run integration test."
            exit 1
          fi

          echo "--- Running test: hollow_cylinder_external_output_no_slip ---"

          python3 src/gmsh_runner.py \
            --step "$STEP_FILE" \
            --lc 0.5 \
            --output "$TEMP_OUTPUT_FILE"

          python3 tests/helpers/compare_json.py "$EXPECTED_OUTPUT_PATH" "$TEMP_OUTPUT_FILE"

          echo "✅ Integration test completed for hollow_cylinder_external_output_no_slip."

      - name: 🧪 Run Unit Tests with Coverage
        run: |
          pytest --cov=src --cov-report=term-missing
          echo "✅ Unit tests and code coverage check completed."

      # ----------------------------------------------------------------------
      # STEP File Normalization
      # ----------------------------------------------------------------------
      - name: ☁️ Download & normalize STEP file
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          chmod +x src/download_from_dropbox.sh
          src/download_from_dropbox.sh

          STEP_FILES=$(find data/testing-input-output -maxdepth 1 -type f -name "*.step")
          COUNT=$(echo "$STEP_FILES" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No STEP file found. Cannot proceed."
            exit 1
          elif [ "$COUNT" -gt 1 ]; then
            echo "⚠️ Multiple STEP files found. Normalizing..."
            STEP_FILE=$(echo "$STEP_FILES" | head -n 1)
            mv "$STEP_FILE" data/testing-input-output/input.step
            echo "✅ Normalized STEP file to input.step."
          else
            STEP_FILE=$(echo "$STEP_FILES")
            if [ "$STEP_FILE" != "data/testing-input-output/input.step" ]; then
              mv "$STEP_FILE" data/testing-input-output/input.step
              echo "✅ Renamed $STEP_FILE to input.step"
            else
              echo "ℹ️ STEP file is already named input.step. No renaming needed."
            fi
          fi

      # ----------------------------------------------------------------------
      # Domain Extraction from STEP
      # ----------------------------------------------------------------------
      - name: 🧠 Extract domain coordinates from STEP
        run: |
          resolution=$(python -c "import json; print(json.load(open('data/testing-input-output/flow_data.json'))['model_properties']['default_resolution'])")
          echo "📐 Resolution: $resolution"

          python3 src/gmsh_runner.py \
            --step data/testing-input-output/input.step \
            --lc "$resolution" \
            --output data/testing-input-output/enriched_metadata.json \
            --debug

      - name: 🔍 Validate output JSON against schema
        run: |
          python -c "
          import json, jsonschema
          from pathlib import Path
          output_path = Path('data/testing-input-output/enriched_metadata.json')
          if not output_path.exists():
            raise FileNotFoundError(f'Schema validation failed — file not found: {output_path}')
          with open('schemas/domain_schema.json') as s, open(output_path) as d:
            schema = json.load(s)
            data = json.load(d)
            jsonschema.validate(instance=data, schema=schema)
          "
          echo "✅ Output schema validated"

      - name: ☁️ Upload outputs to Dropbox
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          chmod +x src/upload_to_dropbox.sh
          src/upload_to_dropbox.sh

      - name: 📝 Log trigger & push
        if: always()
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S'): STEP processor triggered by '${{ github.actor }}' via '${{ github.event_name }}'" >> trigger.txt

          if [ -d "tests/integration_tests_errors" ]; then
            find tests/integration_tests_errors -type f -print0 | while IFS= read -r -d $'\0' file; do
              echo -e "\n--- Commit Details: Run ${{ github.run_id }} / Attempt ${{ github.run_attempt }} ---" >> "$file"
            done
            git add --force tests/integration_tests_errors
            echo "⚠️ Added error reports for commit."
          fi

          git add trigger.txt

          if ! git diff --cached --quiet; then
            git commit -m "🤖 robot: STEP processor trigger log"

            # Inline Git Notes
            git notes add -m "robot: true" || true
            git push origin refs/notes/* || true

            git pull --rebase origin main || echo "⚠️ Rebase failed — check for conflicts"
            git push origin main
          else
            echo "No new logs or errors to commit."
          fi